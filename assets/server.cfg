// =============================================================
//  TFC4KIDS - Snowball Arena
//  Dedicated server configuration
//
//  This file runs once when the server starts up.
//  Lines starting with // are comments (ignored by the game).
//  A safe, friendly first-video-game server: no guns, no
//  grenades, no blood - just snowballs.
//
//  For a documented list of extra cvars you can add here,
//  see CVARS.md in this repository.
// =============================================================

// Write a log of what happens on the server (useful for admins)
log on


// -------------------------------------------------------------
//  KID-FRIENDLY SETTINGS (no violence, gentle gameplay)
// -------------------------------------------------------------

// Turn OFF all blood and gibs. 1 = on, 0 = off.
// Keep these at 0 so nothing scary ever shows up.
violence_ablood  "0"   // alien/robot blood
violence_agibs   "0"   // alien/robot body parts
violence_hblood  "0"   // human blood
violence_hgibs   "0"   // human body parts


// -------------------------------------------------------------
//  COMFORT / ACCESSIBILITY
// -------------------------------------------------------------

// Remove the screen "lean/roll" when strafing side to side.
// Setting this to 0 keeps the camera level, which is easier
// on young eyes and anyone prone to motion sickness.
sv_rollangle    "0"
sv_rollspeed    "0"


// -------------------------------------------------------------
//  GAMEPLAY RULES
// -------------------------------------------------------------

// Team play mode. This value also controls friendly-fire:
// 1301 = teamplay ON with NO friendly-fire health or armor
// damage from weapons or grenades. (See CVARS.md for the math.)
mp_teamplay     "1301"

// How long each map lasts, in minutes.
mp_timelimit    "20"

// Footstep sounds on (1) so you can hear friends running around.
mp_footsteps    "1"

// Don't auto-shuffle players into teams - let them pick.
tfc_autoteam    "0"

// How fast players can move. Higher = zippier snowball fights.
sv_maxspeed     "500"

// Snowball cvars
sb_enabled     "1"     // Snowball gun enabled (1) or disabled (0)
sb_clip        "5"     // Number of snowballs per clip
sb_cooldown    "0.5"   // Time (in seconds) between shots
sb_reload_time "1.5"   // Time (in seconds) to reload after emptying clip
sb_speed       "1000"  // Speed at which snowballs are thrown
sb_snowfight   "0"     // Snowfight mode (1) or normal mode (0) ]
sb_damage      "20"    // Damage dealt by each snowball (0 for no damage


// Flashlight allowed (handy on darker maps).
mp_flashlight   "1"


// -------------------------------------------------------------
//  SERVER IDENTITY & ACCESS
// -------------------------------------------------------------

// The name shown in the server browser. Change to whatever you like.
hostname        "TFC4KIDS - Snowball Arena"

// Password players need to join. Leave empty ("") for an open server.
sv_password     ""

// Password for remote admin commands (rcon).
// CHANGE THIS to something private before going live!
rcon_password   "change_me"

// Players cannot pause the server.
pausable        "0"

// Player collision box size (affects hit detection, not movement).
sv_clienttrace  "3.5"


// -------------------------------------------------------------
//  CONTENT / DOWNLOADS
// -------------------------------------------------------------

// No custom-content fastdownload server is set up for this project,
// so consistency enforcement is left off. If you ever add custom
// maps/models on a download host, you can re-enable consistency
// and set sv_downloadurl here.
mp_consistency  "0"
// sv_downloadurl "https://your-fastdl-host/tfc/"


// -------------------------------------------------------------
//  BAN / IP LISTS
// -------------------------------------------------------------

// Load saved IP and ban lists (created automatically by the server).
exec listip.cfg
exec banned.cfg

